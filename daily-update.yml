name: 毎日コンテンツ更新

on:
  schedule:
    # 毎朝 8:00 JST (= 23:00 UTC 前日) に実行
    - cron: "0 23 * * *"
  workflow_dispatch:  # 手動実行ボタンも有効にする

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # content.json を push するために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存ライブラリをインストール
        run: pip install anthropic

      - name: コンテンツ生成スクリプトを実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: content.json をコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content.json
          git diff --staged --quiet || git commit -m "chore: 毎日コンテンツ更新 $(TZ='Asia/Tokyo' date +'%Y/%m/%d')"
          git push
